# Copy this file to site_config.yml in your content repository.
# Static assets live in public/ inside the content repository.
# Example: public/image/avatar.png -> "/image/avatar.png"

# Site information
site_name: "My Awesome Site"
site_description: "这是一个使用 VitePress 构建的博客站点。"
# SEO uses this as the canonical domain and sitemap host.
site_url: "https://example.com/"
lang: "zh-CN"
author: "57Darling02"

# Visual experience
# isDark: null follows system, true forces dark, false forces light.
# Leave background empty for the built-in adaptive gradient, or use a HEX color or public asset path.
isDark: null
background: ""
bg_rainfall: false

# Home page
home:
  mainTitle: "My Custom Site"
  subTitles:
    - "写 Markdown"
    - "推送文章"
    - "自动上线"

# Post list
# sortMethod: "date" or "lastUpdated".
pageSize: 8
sortMethod: "date"

# Last updated display
lastUpdated:
  use: true

# Profile card
avatar: "/Avatar.png"
name: "57Darling02"
signature: "NPC"
introduction: "红红火火恍恍惚惚"
socialLinks:
  - name: "GitHub"
    # icon supports Lucide kebab-case names and Font Awesome fa-* classes.
    # Font Awesome CSS is loaded only when a fa-* icon is configured.
    icon: "fa-brands fa-github"
    # Replace icon with iconUrl for a local brand SVG, for example:
    # iconUrl: "/image/github.svg"
    url: "https://github.com/57Darling02/"

# Navbar menu
# link uses site paths such as "/FriendLink/" or external URLs such as "https://example.com".
menuItems:
  - key: more
    label: 更多
    icon: "compass"
    children:
      - key: friends
        label: 友链
        icon: users
        link: /FriendLink/

# Navigation music player
# volume range: 0 ~ 1.
musicPlayer:
  enabled: false
  url: "https://music.163.com/song/media/outer/url?id=3372997533.mp3"
  name: "lofi bbox"
  artist: "Shi Nian Yi Shi"
  cover: "https://p2.music.126.net/5GL5jxLP9LCi6HpqXwKJfQ==/109951173099535524.jpg"
  autoplay: false
  volume: 0.6

# Friend links page
friendlink:
  - Name: "57Darling02的博客"
    Url: "https://57darling02.github.io"
    Avatar: "http://q1.qlogo.cn/g?b=qq&nk=3144223912&s=100"
    Desc: "这是一个示例博客描述"

# Footer
footer:
  message: "Hello World!"
  copyright: "Powered by VitePress-Butterfly"
  createdTime: "2025-01-01"

# Comments powered by giscus.
# Fill these values from https://giscus.app.
# mapping: "title" lets the same article share comments across different deployed domains.
# A page can disable comments with frontmatter: comments: false
# A page can force one discussion with frontmatter: commentId: "your-stable-id"
comments:
  enabled: false
  host: "https://giscus.app"
  repo: "owner/repo"
  repoId: ""
  category: "Announcements"
  categoryId: ""
  mapping: "title"
  strict: "0"
  reactionsEnabled: "1"
  emitMetadata: "0"
  inputPosition: "top"
  theme: "preferred_color_scheme"
  lang: "zh-CN"
  loading: "lazy"
